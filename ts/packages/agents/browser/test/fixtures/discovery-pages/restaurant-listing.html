<html>
  <head>
    <title>Restaurants near you - OpenTable</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="/">OpenTable</a>
        <form class="search-form">
          <input
            type="search"
            placeholder="Restaurant name or cuisine"
            class="search-input"
          />
          <button type="submit" class="search-submit">Find a table</button>
        </form>
      </nav>
    </header>
    <main>
      <h1>Restaurants near you</h1>
      <div class="restaurant-list">
        <div class="restaurant-card">
          <a href="/restaurant/chez-marie" class="restaurant-link">
            <h2>Chez Marie</h2>
            <span class="rating">4.8</span>
            <span class="cuisine">French</span>
            <span class="price-range">$$$$</span>
          </a>
        </div>
        <div class="restaurant-card">
          <a href="/restaurant/sushi-zen" class="restaurant-link">
            <h2>Sushi Zen</h2>
            <span class="rating">4.5</span>
            <span class="cuisine">Japanese</span>
            <span class="price-range">$$$</span>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
