<html>
  <head>
    <title>Chicken Parmesan Recipe - Instacart</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="/" class="home-link">Instacart</a>
        <a href="/cart" class="cart-link">Cart</a>
      </nav>
    </header>
    <main>
      <div class="recipe-hero">
        <h1 class="recipe-name">Classic Chicken Parmesan</h1>
        <p class="recipe-summary">
          A family favorite with crispy breaded chicken and melted mozzarella.
        </p>
        <button class="save-recipe-btn">Save Recipe</button>
        <button class="add-all-ingredients-btn">
          Add All Ingredients to Cart
        </button>
      </div>
      <div class="ingredients">
        <h2>Ingredients</h2>
        <ul>
          <li class="ingredient">
            <span>Chicken Breast (2 lbs)</span>
            <span class="price">$8.99</span>
            <button class="add-ingredient-btn">Add</button>
          </li>
          <li class="ingredient">
            <span>Marinara Sauce (24 oz)</span>
            <span class="price">$3.49</span>
            <button class="add-ingredient-btn">Add</button>
          </li>
          <li class="ingredient">
            <span>Mozzarella Cheese (8 oz)</span>
            <span class="price">$4.29</span>
            <button class="add-ingredient-btn">Add</button>
          </li>
        </ul>
      </div>
    </main>
  </body>
</html>
