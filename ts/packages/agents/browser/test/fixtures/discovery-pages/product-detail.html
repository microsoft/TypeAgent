<html>
  <head>
    <title>Widget Pro 3000 - Example Store</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="/">Home</a>
        <form class="search-form">
          <input
            type="search"
            placeholder="Search products..."
            class="search-input"
          />
          <button type="submit" class="search-submit">Search</button>
        </form>
        <a href="/cart" class="cart-link">Cart (2)</a>
      </nav>
    </header>
    <main>
      <div class="product-detail">
        <h1 class="product-name">Widget Pro 3000</h1>
        <span class="price">$49.99</span>
        <span class="rating">4.5 stars (128 reviews)</span>
        <p class="description">The ultimate widget for professionals.</p>
        <div class="availability">
          <span class="in-stock">In Stock</span>
          <span class="store-location">Aisle 7, Shelf B</span>
        </div>
        <button class="add-to-cart-btn" data-product-id="WP3000">
          Add to Cart
        </button>
        <button class="add-to-list-btn">Save to List</button>
      </div>
    </main>
  </body>
</html>
