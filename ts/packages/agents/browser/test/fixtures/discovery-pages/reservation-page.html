<html>
  <head>
    <title>Chez Marie - Make a Reservation - OpenTable</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="/">OpenTable</a>
      </nav>
    </header>
    <main>
      <div class="restaurant-detail">
        <h1>Chez Marie</h1>
        <span class="rating">4.8 (342 reviews)</span>
        <span class="cuisine">French Fine Dining</span>
      </div>
      <div class="reservation-module">
        <h2>Make a Reservation</h2>
        <div class="date-selector">
          <label>Date: <input type="date" value="2026-04-05" /></label>
        </div>
        <div class="party-size">
          <label
            >Party size:
            <select>
              <option>2</option>
              <option>4</option>
              <option>6</option>
            </select></label
          >
        </div>
        <div class="available-times">
          <h3>Available Times</h3>
          <button class="time-slot" data-time="6:00 PM">6:00 PM</button>
          <button class="time-slot" data-time="6:30 PM">6:30 PM</button>
          <button class="time-slot" data-time="7:00 PM">7:00 PM</button>
          <button class="time-slot" data-time="7:30 PM">7:30 PM</button>
          <button class="time-slot" data-time="8:00 PM">8:00 PM</button>
        </div>
      </div>
    </main>
  </body>
</html>
