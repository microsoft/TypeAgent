<svg width="100%" viewBox="0 0 660 240" role="img" xmlns="http://www.w3.org/2000/svg">
<style>text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}</style>
<title>WebFlow recording component layout</title>
<desc>The content script recording module captures DOM events and sends them to the browser agent's webFlows subsystem, which normalizes recordings and generates, validates, executes and registers scripts and grammar via the WebFlow store.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrow-lg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g>
<rect x="40" y="40" width="260" height="150" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="54" y="62" text-anchor="start" dominant-baseline="central" fill="#CECBF6" font-size="13" font-weight="500">Content script — recording/</text>
<text x="54" y="82" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">actions.ts</text>
<text x="54" y="100" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">capture.ts</text>
<text x="54" y="118" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">index.ts</text>
<text x="54" y="136" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">(captures DOM events)</text>
</g>
<g>
<rect x="360" y="40" width="260" height="150" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="374" y="62" text-anchor="start" dominant-baseline="central" fill="#9FE1CB" font-size="13" font-weight="500">Browser agent — webFlows/</text>
<text x="374" y="82" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">recordingNormalizer</text>
<text x="374" y="100" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">scriptGenerator</text>
<text x="374" y="118" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">scriptValidator</text>
<text x="374" y="136" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">scriptExecutor</text>
<text x="374" y="154" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">grammarGenerator  ·  webFlowStore</text>
</g>
<line x1="300" y1="115" x2="360" y2="115" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
