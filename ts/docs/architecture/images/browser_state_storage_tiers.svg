<svg width="100%" viewBox="0 0 720 492" role="img" xmlns="http://www.w3.org/2000/svg">
<style>text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}</style>
<title>Browser agent state and storage tiers</title>
<desc>Five tiers of state persistence for the browser agent, from ephemeral in-memory maps lost on restart, through Chrome session and sync storage, to permanent file-system storage under the user data and per-agent instance directories.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrow-lg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<line x1="360.0" y1="130" x2="360.0" y2="146" stroke="#C2C0B6" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="360.0" y1="202" x2="360.0" y2="218" stroke="#C2C0B6" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="360.0" y1="292" x2="360.0" y2="308" stroke="#C2C0B6" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="360.0" y1="400" x2="360.0" y2="416" stroke="#C2C0B6" stroke-width="1" marker-end="url(#arrow)"/>
<g>
<rect x="40" y="20" width="640" height="110" rx="8" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
<text x="54" y="42" text-anchor="start" dominant-baseline="central" fill="#F5C4B3" font-size="13" font-weight="500">Tier 1 — In-memory (ephemeral, lost on process restart)</text>
<text x="54" y="62" text-anchor="start" dominant-baseline="central" fill="#F0997B" font-size="11" font-weight="400">Agent: extraction cache, retry counters, RPC maps</text>
<text x="54" y="80" text-anchor="start" dominant-baseline="central" fill="#F0997B" font-size="11" font-weight="400">Service worker: RPC map, navigation dedup, callbacks</text>
<text x="54" y="98" text-anchor="start" dominant-baseline="central" fill="#F0997B" font-size="11" font-weight="400">Content script: recording state, DOM element IDs</text>
<text x="54" y="116" text-anchor="start" dominant-baseline="central" fill="#F0997B" font-size="11" font-weight="400">Electron: BrowserViewManager tab map</text>
</g>
<g>
<rect x="40" y="146" width="640" height="56" rx="8" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
<text x="54" y="168" text-anchor="start" dominant-baseline="central" fill="#F5C4B3" font-size="13" font-weight="500">Tier 2 — Chrome storage session (survives SW restart)</text>
<text x="54" y="188" text-anchor="start" dominant-baseline="central" fill="#F0997B" font-size="11" font-weight="400">Recording state: actions, HTML, screenshots, index</text>
</g>
<g>
<rect x="40" y="218" width="640" height="74" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="54" y="240" text-anchor="start" dominant-baseline="central" fill="#CECBF6" font-size="13" font-weight="500">Tier 3 — Chrome storage sync / local (permanent, synced)</text>
<text x="54" y="260" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="11" font-weight="400">Settings: websocketHost, autoIndexing, extractionMode</text>
<text x="54" y="278" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="11" font-weight="400">Search history</text>
</g>
<g>
<rect x="40" y="308" width="640" height="92" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="54" y="330" text-anchor="start" dominant-baseline="central" fill="#9FE1CB" font-size="13" font-weight="500">Tier 4 — File system: user data (~/.typeagent/)</text>
<text x="54" y="350" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="11" font-weight="400">Knowledge index: entity/topic graphs, website collection</text>
<text x="54" y="368" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="11" font-weight="400">WebFlow store: flow definitions, scripts, registry index</text>
<text x="54" y="386" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="11" font-weight="400">Shell settings, PDF storage (annotations, URL mappings)</text>
</g>
<g>
<rect x="40" y="416" width="640" height="56" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="54" y="438" text-anchor="start" dominant-baseline="central" fill="#9FE1CB" font-size="13" font-weight="500">Tier 5 — File system: instance storage (agent context)</text>
<text x="54" y="458" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="11" font-weight="400">Per-agent session data managed via agent SDK</text>
</g>
</svg>
