<svg width="100%" viewBox="0 0 780 600" role="img" xmlns="http://www.w3.org/2000/svg">
<style>text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}</style>
<title>Browser agent component layout</title>
<desc>The TypeAgent dispatcher hosts the browser agent, which connects over a channel-multiplexed WebSocket on port 8081 to two backends: the Chrome extension service worker with its content scripts and side panel UI, and the Electron shell main process with its WebContentsView tabs.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrow-lg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="40" y="20" width="700" height="150" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3"/>
<text x="52" y="38" text-anchor="start" fill="#D3D1C7" font-size="12" font-weight="600">TypeAgent Dispatcher (Node.js process)</text>
<g>
<rect x="70" y="44" width="640" height="110" rx="8" fill="#444441" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="84" y="66" text-anchor="start" dominant-baseline="central" fill="#D3D1C7" font-size="13" font-weight="500">Browser Agent (browserActionHandler.mts)</text>
<text x="84" y="86" text-anchor="start" dominant-baseline="central" fill="#B4B2A9" font-size="12" font-weight="400">Action router: executeBrowserAction()</text>
<text x="84" y="104" text-anchor="start" dominant-baseline="central" fill="#B4B2A9" font-size="12" font-weight="400">AgentWebSocketServer (port 8081) + ExternalBrowserClient</text>
<text x="84" y="122" text-anchor="start" dominant-baseline="central" fill="#B4B2A9" font-size="12" font-weight="400">Knowledge subsystem, WebFlow store, Discovery subsystem</text>
</g>
<line x1="390" y1="170" x2="390" y2="196" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="390" y="184" text-anchor="middle" dominant-baseline="central" fill="#C2C0B6" font-size="11" font-weight="400">WebSocket :8081  ·  channel-multiplexed RPC</text>
<path d="M390 196 L390 212 L200 212 L200 232" fill="none" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M390 196 L390 212 L580 212 L580 232" fill="none" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="232" width="340" height="348" rx="10" fill="none" stroke="#AFA9EC" stroke-width="0.8" stroke-dasharray="4 3"/>
<text x="52" y="250" text-anchor="start" fill="#CECBF6" font-size="12" font-weight="600">Chrome Extension (service worker process)</text>
<g>
<rect x="60" y="256" width="300" height="92" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="74" y="278" text-anchor="start" dominant-baseline="central" fill="#CECBF6" font-size="13" font-weight="500">Service worker</text>
<text x="74" y="298" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">WebSocket client / ExternalBrowserServer</text>
<text x="74" y="316" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">RPC handler pool (100+ handlers)</text>
<text x="74" y="334" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">Tab &amp; recording manager</text>
</g>
<line x1="210" y1="348" x2="210" y2="372" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
<g>
<rect x="60" y="372" width="300" height="110" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="74" y="394" text-anchor="start" dominant-baseline="central" fill="#CECBF6" font-size="13" font-weight="500">Content scripts (per-tab, per-frame)</text>
<text x="74" y="414" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">DOM interaction  ·  Recording capture</text>
<text x="74" y="432" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">Schema extraction  ·  Auto-indexing</text>
<text x="74" y="450" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">WebAgent runtime</text>
</g>
<g>
<rect x="60" y="494" width="300" height="74" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="74" y="516" text-anchor="start" dominant-baseline="central" fill="#CECBF6" font-size="13" font-weight="500">Side panel UI</text>
<text x="74" y="536" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">Chat interface  ·  Knowledge library</text>
<text x="74" y="554" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">Macros library  ·  Graph visualizations</text>
</g>
<rect x="400" y="232" width="340" height="348" rx="10" fill="none" stroke="#5DCAA5" stroke-width="0.8" stroke-dasharray="4 3"/>
<text x="412" y="250" text-anchor="start" fill="#9FE1CB" font-size="12" font-weight="600">Electron Shell (main process)</text>
<g>
<rect x="420" y="256" width="300" height="110" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="434" y="278" text-anchor="start" dominant-baseline="central" fill="#9FE1CB" font-size="13" font-weight="500">Shell main</text>
<text x="434" y="298" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">BrowserViewManager  ·  BrowserAgentIpc</text>
<text x="434" y="316" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">InlineBrowserControl</text>
<text x="434" y="334" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">CDP fingerprint masking</text>
</g>
<line x1="570" y1="366" x2="570" y2="390" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
<g>
<rect x="420" y="390" width="300" height="92" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="434" y="412" text-anchor="start" dominant-baseline="central" fill="#9FE1CB" font-size="13" font-weight="500">WebContentsView tabs (per-tab renderer)</text>
<text x="434" y="432" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">Content scripts</text>
<text x="434" y="450" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">WebAgent instances</text>
<text x="434" y="468" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">Site agent activation</text>
</g>
</svg>
