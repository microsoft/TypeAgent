<svg width="100%" viewBox="0 0 660 190" role="img" xmlns="http://www.w3.org/2000/svg">
<style>text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}</style>
<title>Action discovery component layout</title>
<desc>The content script captures HTML and a screenshot of an unfamiliar page and sends them to the browser agent's discovery subsystem, which translates the page into candidate actions via an LLM and registers them through its action handler and schema.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrow-lg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g>
<rect x="40" y="40" width="260" height="106" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="54" y="62" text-anchor="start" dominant-baseline="central" fill="#CECBF6" font-size="13" font-weight="500">Content script</text>
<text x="54" y="82" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">HTML capture</text>
<text x="54" y="100" text-anchor="start" dominant-baseline="central" fill="#AFA9EC" font-size="12" font-weight="400">Screenshot</text>
</g>
<g>
<rect x="360" y="40" width="260" height="106" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="374" y="62" text-anchor="start" dominant-baseline="central" fill="#9FE1CB" font-size="13" font-weight="500">Browser agent — discovery/</text>
<text x="374" y="82" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">translator.mts (LLM)</text>
<text x="374" y="100" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">actionHandler.mts</text>
<text x="374" y="118" text-anchor="start" dominant-baseline="central" fill="#5DCAA5" font-size="12" font-weight="400">schema/ (action types)</text>
</g>
<line x1="300" y1="93" x2="360" y2="93" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
