    <script>
      (function () {
        var DATA = JSON.parse(document.getElementById("data").textContent);
        var mapEl = document.getElementById("map");
        var crumbEl = document.getElementById("breadcrumb");
        var searchEl = document.getElementById("q");
        var GAP = 6;

        function esc(s) {
          return String(s == null ? "" : s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }

        function computeValue(node) {
          if (node._value != null) return node._value;
          if (!node.children || !node.children.length) {
            node._value = 1;
            return 1;
          }
          var s = 0;
          for (var i = 0; i < node.children.length; i++)
            s += computeValue(node.children[i]);
          node._value = s;
          return s;
        }
        function assignHues(root) {
          var kids = root.children || [];
          var n = kids.length;
          for (var i = 0; i < n; i++) {
            setHue(kids[i], Math.round((i / Math.max(1, n)) * 360));
          }
        }
        function setHue(node, h) {
          node._hue = h;
          if (node.children)
            node.children.forEach(function (c) {
              setHue(c, h);
            });
        }

        computeValue(DATA.agents);
        computeValue(DATA.commands);
        assignHues(DATA.agents);
        assignHues(DATA.commands);

        var state = { mode: "agents", path: [DATA.agents], query: "" };

        function currentNode() {
          return state.path[state.path.length - 1];
        }

        function colorFor(node, idx, n) {
          var h = node._hue == null ? 210 : node._hue;
          var sat = node.kind === "action" || node.kind === "command" ? 40 : 58;
          var base =
            node.kind === "category" || node.kind === "group"
              ? 42
              : node.kind === "agent"
                ? 52
                : 66;
          var jitter = n > 1 ? (idx / (n - 1) - 0.5) * 12 : 0;
          return "hsl(" + h + "," + sat + "%," + (base + jitter) + "%)";
        }

        // Squarified treemap: items [{node,value}] -> [{node,x,y,w,h}]
        function squarify(items, X, Y, W, H) {
          var out = [];
          if (!items.length || W <= 0 || H <= 0) return out;
          var sum = 0;
          items.forEach(function (it) {
            sum += it.value;
          });
          if (sum <= 0) return out;
          var scale = (W * H) / sum;
          var rem = items.map(function (it) {
            return { node: it.node, area: it.value * scale };
          });
          var rect = { x: X, y: Y, w: W, h: H };
          function worst(row, len) {
            if (!row.length) return Infinity;
            var mx = -Infinity,
              mn = Infinity,
              s = 0;
            for (var k = 0; k < row.length; k++) {
              var a = row[k].area;
              s += a;
              if (a > mx) mx = a;
              if (a < mn) mn = a;
            }
            var s2 = s * s,
              l2 = len * len;
            return Math.max((l2 * mx) / s2, s2 / (l2 * mn));
          }
          while (rem.length) {
            var len = Math.min(rect.w, rect.h);
            var row = [];
            while (rem.length) {
              var withNext = row.concat([rem[0]]);
              if (!row.length || worst(row, len) >= worst(withNext, len)) {
                row.push(rem.shift());
              } else break;
            }
            var rowArea = 0;
            row.forEach(function (r) {
              rowArea += r.area;
            });
            if (rect.w <= rect.h) {
              var rh = rowArea / rect.w,
                cx = rect.x;
              for (var k = 0; k < row.length; k++) {
                var cw = row[k].area / rh;
                out.push({ node: row[k].node, x: cx, y: rect.y, w: cw, h: rh });
                cx += cw;
              }
              rect.y += rh;
              rect.h -= rh;
            } else {
              var cw2 = rowArea / rect.h,
                cy = rect.y;
              for (var k = 0; k < row.length; k++) {
                var ch = row[k].area / cw2;
                out.push({
                  node: row[k].node,
                  x: rect.x,
                  y: cy,
                  w: cw2,
                  h: ch,
                });
                cy += ch;
              }
              rect.x += cw2;
              rect.w -= cw2;
            }
          }
          return out;
        }

        function displayName(node) {
          if (node.kind === "command") return "@" + node.name;
          if (node.kind === "action" && state.query && node.agent)
            return node.agent + " · " + node.name;
          return (node.emoji ? node.emoji + " " : "") + node.name;
        }
        function subLabel(node) {
          var c = node.children ? node.children.length : 0;
          if (node.kind === "category")
            return c + (c === 1 ? " agent" : " agents");
          if (node.kind === "agent")
            return c + (c === 1 ? " action" : " actions");
          if (node.kind === "group")
            return c + (c === 1 ? " command" : " commands");
          return "";
        }

        function placeCell(el, c) {
          el.style.left = c.x + GAP / 2 + "px";
          el.style.top = c.y + GAP / 2 + "px";
          el.style.width = Math.max(0, c.w - GAP) + "px";
          el.style.height = Math.max(0, c.h - GAP) + "px";
        }

        function labelSizes(role, w, h) {
          if (role === "container") {
            var cf = Math.max(12, Math.min(w * 0.05, 18));
            return { name: cf, sub: Math.max(10, cf * 0.72), showSub: w > 150 };
          }
          var nf = Math.max(8, Math.min(w * 0.11, h * 0.32, 24));
          return {
            name: nf,
            sub: Math.max(9, Math.min(nf * 0.6, 13)),
            showSub: h >= 46 && w >= 58,
          };
        }

        function buildCell(c, role, idx, n) {
          var node = c.node;
          var el = document.createElement("div");
          el.className = "cell " + role + " k-" + node.kind;
          el._layout = c;
          if (role === "container") {
            var h = node._hue == null ? 210 : node._hue;
            el.style.background = "hsl(" + h + ",40%,22%)";
          } else {
            el.style.background = colorFor(node, idx, n);
          }
          var sub = subLabel(node);
          var sz = labelSizes(role, c.w, c.h);
          var vertical = false;
          if (role === "tile" && c.h > c.w * 1.6 && c.w < 60 && c.h > 52) {
            // tall, narrow tile — render the label vertically so it stays readable
            vertical = true;
            var vf = Math.max(9, Math.min(c.w * 0.52, c.h * 0.14, 22));
            sz = { name: vf, sub: 0, showSub: false };
          }
          var lblCls = role === "container" ? "lbl hdr" : "lbl";
          var nameHtml =
            '<span class="lbl-name" style="font-size:' +
            Math.round(sz.name) +
            'px">' +
            esc(displayName(node)) +
            "</span>";
          var subHtml =
            sub && sz.showSub
              ? '<span class="lbl-sub" style="font-size:' +
                Math.round(sz.sub) +
                'px">' +
                esc(sub) +
                "</span>"
              : "";
          el.innerHTML =
            '<div class="' + lblCls + '">' + nameHtml + subHtml + "</div>";
          var t =
            node.kind === "action" && node.agent
              ? node.agent + " · " + node.name
              : displayName(node);
          el.title = t + (node.description ? " — " + node.description : "");
          if (role === "tile") {
            if (vertical) {
              el.classList.add("vert");
            } else {
              if (Math.min(c.w, c.h) < 28) el.classList.add("sm");
              if (c.w < 22 || c.h < 15) el.classList.add("tiny");
            }
          }
          el.addEventListener("click", function (ev) {
            ev.stopPropagation();
            onCellClick(node, el);
          });
          return el;
        }

        function onCellClick(node, el) {
          // Agents and command groups open a details dialog (a treemap of their
          // actions/commands would be meaningless without usage data); categories
          // zoom in; leaves (reached via search) open the side panel.
          if (node.kind === "agent" || node.kind === "group") {
            openActionsDialog(node);
            return;
          }
          if (node.children && node.children.length) {
            var r = el._layout;
            state.path.push(node);
            render({ x: r.x, y: r.y, w: r.w, h: r.h });
            return;
          }
          openPanel(node);
        }

        function currentChildren() {
          if (state.query) return searchLeaves();
          var node = currentNode();
          return node.children || [];
        }

        function startPlace(el, c, fromRect, W, H) {
          if (fromRect) {
            var sx = fromRect.x + (c.x / W) * fromRect.w;
            var sy = fromRect.y + (c.y / H) * fromRect.h;
            var sw = (c.w / W) * fromRect.w,
              sh = (c.h / H) * fromRect.h;
            el.style.left = sx + GAP / 2 + "px";
            el.style.top = sy + GAP / 2 + "px";
            el.style.width = Math.max(0, sw - GAP) + "px";
            el.style.height = Math.max(0, sh - GAP) + "px";
          } else {
            placeCell(el, c);
          }
          el.style.opacity = "0";
        }

        // Dampen tile sizing so lopsided action counts don't create unreadable
        // slivers (sizes aren't telemetry-based, so a gentler scale is fine).
        function sizeValue(v) {
          return Math.pow(v > 0 ? v : 1, 0.6);
        }

        function render(fromRect) {
          var kids = currentChildren();
          var W = mapEl.clientWidth,
            H = mapEl.clientHeight;
          mapEl.innerHTML = "";
          if (!kids.length) {
            var e = document.createElement("div");
            e.className = "empty";
            e.textContent = state.query
              ? "No matches for “" + state.query + "”."
              : "Nothing to show here.";
            mapEl.appendChild(e);
            renderBreadcrumb();
            return;
          }
          // At the top level (agents mode), promote agents: draw each category as a
          // labelled container with its agent tiles nested inside (one level deep).
          var nested =
            !state.query && state.path.length === 1 && state.mode === "agents";
          var HEADER = 26,
            PAD = 7;
          var top = squarify(
            kids.map(function (k) {
              return { node: k, value: sizeValue(k._value || 1) };
            }),
            0,
            0,
            W,
            H,
          );
          var pending = [];
          function add(el, c) {
            startPlace(el, c, fromRect, W, H);
            pending.push({ el: el, c: c });
          }
          top.forEach(function (c, idx) {
            var node = c.node;
            var canNest =
              nested &&
              node.children &&
              node.children.length &&
              c.w > 78 &&
              c.h > HEADER + 36;
            if (canNest) {
              var cont = buildCell(c, "container", idx, top.length);
              mapEl.appendChild(cont);
              add(cont, c);
              var inner = squarify(
                node.children.map(function (k) {
                  return { node: k, value: sizeValue(k._value || 1) };
                }),
                c.x + PAD,
                c.y + HEADER,
                c.w - 2 * PAD,
                c.h - HEADER - PAD,
              );
              inner.forEach(function (ic, j) {
                var tile = buildCell(ic, "tile", j, inner.length);
                mapEl.appendChild(tile);
                add(tile, ic);
              });
            } else {
              var el = buildCell(c, "tile", idx, top.length);
              mapEl.appendChild(el);
              add(el, c);
            }
          });
          void mapEl.offsetWidth; // force reflow so start styles apply before the transition
          pending.forEach(function (p) {
            placeCell(p.el, p.c);
            p.el.style.opacity = "1";
          });
          renderBreadcrumb();
        }

        function renderBreadcrumb() {
          crumbEl.innerHTML = "";
          state.path.forEach(function (node, i) {
            var a = document.createElement("button");
            a.className = "crumb";
            a.textContent =
              i === 0
                ? state.mode === "agents"
                  ? "All categories"
                  : "All commands"
                : (node.emoji ? node.emoji + " " : "") + node.name;
            a.addEventListener("click", function () {
              state.query = "";
              searchEl.value = "";
              state.path = state.path.slice(0, i + 1);
              render();
            });
            crumbEl.appendChild(a);
            if (i < state.path.length - 1 || state.query) {
              var s = document.createElement("span");
              s.className = "crumb-sep";
              s.textContent = "›";
              crumbEl.appendChild(s);
            }
          });
          if (state.query) {
            var r = document.createElement("span");
            r.className = "crumb crumb-static";
            r.textContent = "Results: “" + state.query + "”";
            crumbEl.appendChild(r);
          }
        }

        function buildHay(node) {
          var parts = [node.name, node.description || "", node.agent || ""];
          if (node.parameters)
            node.parameters.forEach(function (p) {
              parts.push(p.name, p.description || "");
            });
          if (node.phrasings) parts = parts.concat(node.phrasings);
          if (node.args)
            node.args.forEach(function (a) {
              parts.push(a.name, a.description || "");
            });
          if (node.flags)
            node.flags.forEach(function (f) {
              parts.push(f.name, f.description || "");
            });
          return parts.join(" ").toLowerCase();
        }
        function searchLeaves() {
          var root = state.mode === "agents" ? DATA.agents : DATA.commands;
          var toks = state.query.split(/\s+/).filter(Boolean);
          var out = [];
          (function walk(n) {
            if (n.children && n.children.length) n.children.forEach(walk);
            else {
              if (n._hay == null) n._hay = buildHay(n);
              var ok = true;
              for (var i = 0; i < toks.length; i++) {
                if (n._hay.indexOf(toks[i]) < 0) {
                  ok = false;
                  break;
                }
              }
              if (ok) out.push(n);
            }
          })(root);
          return out;
        }

        function closePanel() {
          document.getElementById("panel").classList.remove("open");
          document.getElementById("backdrop").classList.remove("show");
        }

        // tabs
        Array.prototype.forEach.call(
          document.querySelectorAll(".tab"),
          function (tab) {
            tab.addEventListener("click", function () {
              Array.prototype.forEach.call(
                document.querySelectorAll(".tab"),
                function (t) {
                  t.classList.remove("active");
                },
              );
              tab.classList.add("active");
              state.mode = tab.getAttribute("data-mode");
              state.query = "";
              searchEl.value = "";
              state.path = [
                state.mode === "agents" ? DATA.agents : DATA.commands,
              ];
              render();
            });
          },
        );

        // search
        var searchTimer = null;
        searchEl.addEventListener("input", function () {
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(function () {
            state.query = searchEl.value.trim().toLowerCase();
            render();
          }, 120);
        });

        // click empty map area -> zoom out one level
        mapEl.addEventListener("click", function () {
          if (state.query) return;
          if (state.path.length > 1) {
            state.path.pop();
            render();
          }
        });

        // Shared detail markup for an action or command (used by the side panel and
        // the accordion layout).
        function detailHtml(node) {
          var html = "";
          if (node.kind === "action") {
            html +=
              '<div class="p-badges">' +
              (node.enabled
                ? '<span class="badge on">enabled by default</span>'
                : '<span class="badge off">disabled by default</span>') +
              (node.transient
                ? '<span class="badge neutral">on-demand</span>'
                : "") +
              "</div>";
            if (node.description)
              html += '<p class="p-desc">' + esc(node.description) + "</p>";
            if (node.parameters && node.parameters.length) {
              html +=
                '<h3>Parameters</h3><table class="p-params"><tr><th>Name</th><th>Type</th><th></th><th>Description</th></tr>';
              node.parameters.forEach(function (p) {
                html +=
                  "<tr><td><code>" +
                  esc(p.name) +
                  '</code></td><td><code class="ptype">' +
                  esc(p.type) +
                  "</code></td><td>" +
                  (p.optional
                    ? '<span class="opt">optional</span>'
                    : '<span class="req">required</span>') +
                  "</td><td>" +
                  esc(p.description || "") +
                  "</td></tr>";
              });
              html += "</table>";
            }
            if (node.phrasings && node.phrasings.length) {
              html += '<h3>Try saying</h3><div class="p-chips">';
              node.phrasings.forEach(function (p) {
                html += '<span class="chip">' + esc(p) + "</span>";
              });
              html += "</div>";
            }
          } else if (node.kind === "command") {
            if (node.description)
              html += '<p class="p-desc">' + esc(node.description) + "</p>";
            if (node.args && node.args.length) {
              html += '<h3>Arguments</h3><ul class="p-list">';
              node.args.forEach(function (a) {
                html +=
                  "<li><code>&lt;" +
                  esc(a.name) +
                  "&gt;</code>" +
                  (a.optional ? " (optional)" : "") +
                  " — " +
                  esc(a.description || "") +
                  "</li>";
              });
              html += "</ul>";
            }
            if (node.flags && node.flags.length) {
              html += '<h3>Flags</h3><ul class="p-list">';
              node.flags.forEach(function (f) {
                html +=
                  "<li><code>" +
                  (f.char ? "-" + esc(f.char) + ", " : "") +
                  "--" +
                  esc(f.name) +
                  "</code> — " +
                  esc(f.description || "") +
                  (f["default"]
                    ? " (default: " + esc(f["default"]) + ")"
                    : "") +
                  "</li>";
              });
              html += "</ul>";
            }
          }
          return html;
        }

        function openPanel(node) {
          if (node.kind !== "action" && node.kind !== "command") return;
          var kicker =
            node.kind === "action"
              ? esc(node.agent || "") + " · " + esc(node.schema || "")
              : "system command";
          var title =
            node.kind === "command" ? "@" + esc(node.name) : esc(node.name);
          document.getElementById("panelBody").innerHTML =
            '<div class="p-kicker">' +
            kicker +
            '</div><h2 class="p-title">' +
            title +
            "</h2>" +
            detailHtml(node);
          document.getElementById("panel").classList.add("open");
          document.getElementById("backdrop").classList.add("show");
        }

        // ---- actions dialog (prototype layouts) ----
        var DLG = { node: null, layout: "table" };
        function itemLabel(node) {
          return node.kind === "command" ? "@" + node.name : node.name;
        }
        function itemMeta(node) {
          if (node.kind === "action") {
            var p = node.parameters ? node.parameters.length : 0,
              ph = node.phrasings ? node.phrasings.length : 0;
            return (
              p +
              (p === 1 ? " param" : " params") +
              (ph ? " · " + ph + " phrasing" + (ph === 1 ? "" : "s") : "")
            );
          }
          var a =
            (node.args ? node.args.length : 0) +
            (node.flags ? node.flags.length : 0);
          return a + (a === 1 ? " option" : " options");
        }
        function itemParams(node) {
          if (node.kind === "action") {
            return (node.parameters || [])
              .map(function (p) {
                return p.name + (p.optional ? "?" : "");
              })
              .join(", ");
          }
          return (node.args || [])
            .map(function (a) {
              return "<" + a.name + ">";
            })
            .concat(
              (node.flags || []).map(function (f) {
                return "--" + f.name;
              }),
            )
            .join(", ");
        }
        function openActionsDialog(node) {
          DLG.node = node;
          DLG.sort = { key: "name", dir: 1 };
          document.getElementById("dlgTitle").innerHTML =
            (node.emoji ? esc(node.emoji) + " " : "") + esc(node.name);
          document.getElementById("dlgDesc").textContent =
            node.description || "";
          var c = node.children ? node.children.length : 0;
          document.getElementById("dlgCount").textContent =
            c +
            " " +
            (node.kind === "agent"
              ? c === 1
                ? "action"
                : "actions"
              : c === 1
                ? "command"
                : "commands");
          renderDialogBody();
          document.getElementById("dlgBackdrop").classList.add("show");
          document.getElementById("dlg").classList.add("open");
        }
        function closeDialog() {
          document.getElementById("dlg").classList.remove("open");
          document.getElementById("dlgBackdrop").classList.remove("show");
        }
        function renderDialogBody() {
          var items = (DLG.node && DLG.node.children) || [];
          Array.prototype.forEach.call(
            document.querySelectorAll(".dlg-lay"),
            function (b) {
              b.classList.toggle(
                "active",
                b.getAttribute("data-layout") === DLG.layout,
              );
            },
          );
          var L = DLG.layout,
            html;
          if (L === "cards") html = dlgCards(items);
          else if (L === "table") html = dlgTable(items);
          else if (L === "accordion") html = dlgAccordion(items);
          else html = dlgList(items);
          var b = document.getElementById("dlgBody");
          b.innerHTML = html;
          b.scrollTop = 0;
        }
        function dlgList(items) {
          var h = '<ul class="dlg-list">';
          items.forEach(function (it, i) {
            h +=
              '<li class="dlg-row" data-idx="' +
              i +
              '"><div class="dlg-name">' +
              esc(itemLabel(it)) +
              "</div>" +
              (it.description
                ? '<div class="dlg-row-desc">' + esc(it.description) + "</div>"
                : "") +
              "</li>";
          });
          return h + "</ul>";
        }
        function dlgCards(items) {
          var h = '<div class="dlg-cards">';
          items.forEach(function (it, i) {
            h +=
              '<div class="dlg-card" data-idx="' +
              i +
              '"><div class="dlg-card-name">' +
              esc(itemLabel(it)) +
              "</div>" +
              (it.description
                ? '<div class="dlg-card-desc">' + esc(it.description) + "</div>"
                : "") +
              '<div class="dlg-card-meta">' +
              esc(itemMeta(it)) +
              "</div></div>";
          });
          return h + "</div>";
        }
        function paramCount(node) {
          if (node.kind === "action")
            return node.parameters ? node.parameters.length : 0;
          return (
            (node.args ? node.args.length : 0) +
            (node.flags ? node.flags.length : 0)
          );
        }
        function cmpItems(a, b, key) {
          if (key === "params") return paramCount(a) - paramCount(b);
          var av = key === "desc" ? a.description || "" : itemLabel(a);
          var bv = key === "desc" ? b.description || "" : itemLabel(b);
          return av.toLowerCase().localeCompare(bv.toLowerCase());
        }
        function dlgTable(items) {
          var s = DLG.sort || { key: null, dir: 1 };
          var arr = items.slice();
          if (s.key) {
            arr.sort(function (a, b) {
              return cmpItems(a, b, s.key) * s.dir;
            });
          }
          function th(key, label) {
            var on = s.key === key;
            return (
              '<th data-sort="' +
              key +
              '" class="' +
              (on ? "sorted" : "") +
              '">' +
              esc(label) +
              (on
                ? ' <span class="sort-ar">' +
                  (s.dir > 0 ? "▲" : "▼") +
                  "</span>"
                : "") +
              "</th>"
            );
          }
          var h =
            '<table class="dlg-table"><thead><tr>' +
            th("name", DLG.node.kind === "agent" ? "Action" : "Command") +
            th("params", "Parameters") +
            th("desc", "Description") +
            "</tr></thead><tbody>";
          arr.forEach(function (it) {
            var i = items.indexOf(it);
            h +=
              '<tr data-idx="' +
              i +
              '"><td class="dlg-tname">' +
              esc(itemLabel(it)) +
              '</td><td class="dlg-tparams">' +
              esc(itemParams(it) || "—") +
              "</td><td>" +
              esc(it.description || "") +
              "</td></tr>";
          });
          return h + "</tbody></table>";
        }
        function dlgAccordion(items) {
          var h = '<div class="dlg-acc">';
          items.forEach(function (it, i) {
            h +=
              '<div class="dlg-acc-item" data-idx="' +
              i +
              '"><button class="dlg-acc-head"><span class="dlg-name">' +
              esc(itemLabel(it)) +
              "</span>" +
              (it.description
                ? '<span class="dlg-row-desc">' +
                  esc(it.description) +
                  "</span>"
                : "") +
              '<span class="caret">›</span></button><div class="dlg-acc-body">' +
              detailHtml(it) +
              "</div></div>";
          });
          return h + "</div>";
        }

        document
          .getElementById("panelClose")
          .addEventListener("click", closePanel);
        document
          .getElementById("backdrop")
          .addEventListener("click", closePanel);

        // actions dialog wiring
        document
          .getElementById("dlgClose")
          .addEventListener("click", closeDialog);
        document
          .getElementById("dlgBackdrop")
          .addEventListener("click", closeDialog);
        Array.prototype.forEach.call(
          document.querySelectorAll(".dlg-lay"),
          function (b) {
            b.addEventListener("click", function () {
              Array.prototype.forEach.call(
                document.querySelectorAll(".dlg-lay"),
                function (x) {
                  x.classList.remove("active");
                },
              );
              b.classList.add("active");
              DLG.layout = b.getAttribute("data-layout");
              renderDialogBody();
            });
          },
        );
        document
          .getElementById("dlgBody")
          .addEventListener("click", function (ev) {
            var t = ev.target;
            if (DLG.layout === "accordion") {
              var head = t.closest ? t.closest(".dlg-acc-head") : null;
              if (head) head.parentNode.classList.toggle("open");
              return;
            }
            if (DLG.layout === "table") {
              var th = t.closest ? t.closest("th[data-sort]") : null;
              if (th) {
                var k = th.getAttribute("data-sort");
                if (DLG.sort && DLG.sort.key === k)
                  DLG.sort.dir = -DLG.sort.dir;
                else DLG.sort = { key: k, dir: 1 };
                renderDialogBody();
                return;
              }
            }
            var row = t.closest ? t.closest("[data-idx]") : null;
            if (row) {
              var i = +row.getAttribute("data-idx");
              var it = ((DLG.node && DLG.node.children) || [])[i];
              if (it) openPanel(it);
            }
          });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            if (document.getElementById("panel").classList.contains("open"))
              closePanel();
            else if (document.getElementById("dlg").classList.contains("open"))
              closeDialog();
            else if (state.query) {
              state.query = "";
              searchEl.value = "";
              render();
            } else if (state.path.length > 1) {
              state.path.pop();
              render();
            }
          }
        });

        var rzTimer = null;
        window.addEventListener("resize", function () {
          if (rzTimer) cancelAnimationFrame(rzTimer);
          rzTimer = requestAnimationFrame(function () {
            render();
          });
        });

        render();
      })();
    </script>
  </body>
</html>
