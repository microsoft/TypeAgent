trigger:
  branches:
    include:
      - main

pr:
  branches:
    exclude:
      - "*"

pool:
  vmImage: "ubuntu-latest"

variables:
  - name: buildDirectory
    value: $(Build.SourcesDirectory)/ts
  - name: packageDirectory
    value: $(Build.ArtifactStagingDirectory)/packages
  - name: publishedPackageDirectory
    value: $(Build.ArtifactStagingDirectory)/packages/published
  - name: NpmRcDirectory
    value: $(Build.SourcesDirectory)
jobs:
  - job: build_ts
    displayName: "Build TypeScript Project"
    strategy:
      matrix:
        node_24:
          nodeVersion: "24"
    steps:
      - template: include-prepare-repo.yml
        parameters:
          buildDirectory: $(buildDirectory)
          nodeVersion: $(nodeVersion)
          registry: $(INSTALL_REGISTRY)

      - template: include-update-package-version.yml
        parameters:
          buildDirectory: $(buildDirectory)
          prerelease: $(Build.BuildId)

      - script: |
          npm run build
        displayName: "Build"
        workingDirectory: $(buildDirectory)

      - script: |
          pnpm pack --filter @typeagent/* --pack-destination $(publishedPackageDirectory)
        displayName: "Pack Published packages"
        workingDirectory: $(buildDirectory)

      - script: |
          pnpm pack --filter=\!@typeagent/* --pack-destination $(packageDirectory)
        displayName: "Pack Non-published packages"
        workingDirectory: $(buildDirectory)

      - publish: $(packageDirectory)
        artifact: Packages

      - script: |
          sudo apt install libsecret-1-0
        displayName: "Install libsecret-1-0"
        condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))

      - script: |
          npm run test:local
        displayName: "Run Tests (Local)"
        workingDirectory: $(buildDirectory)

      - script: |
          Xvfb :99 -screen 0 1600x1200x24 &
          export DISPLAY=:99
          npm run test:ui
        displayName: "UI tests (requires display)"
        condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))
        workingDirectory: $(buildDirectory)

      - script: |
          npm run lint
        displayName: "Lint"
        workingDirectory: $(buildDirectory)

      - script: |
          npm run check:policy
        displayName: "Check Policy"
        workingDirectory: $(buildDirectory)

      - script: |
          echo $(PUBLISH_REGISTRY)
          echo "registry=$(PUBLISH_REGISTRY)" > .npmrc
          cat .npmrc
        displayName: "Create .npmrc file."
        workingDirectory: $(NpmRcDirectory)

      - task: npmAuthenticate@0
        inputs:
          workingFile: "$(NpmRcDirectory)/.npmrc"
        displayName: "Authenticate with Azure Artifacts"

      - script: |
          for file in $(publishedPackageDirectory)/*.tgz; do
            echo "Publishing file: $file"
            npm publish --registry=$(PUBLISH_REGISTRY) --tag=latest "$file"
          done
        displayName: "Publish packages"
        workingDirectory: $(NpmRcDirectory)

      # PUBLISH_REGISTRY is an upstream source of INSTALL_REGISTRY. Upstreams
      # are pull-through: a package published to PUBLISH_REGISTRY only shows up
      # in INSTALL_REGISTRY after something requests it through INSTALL_REGISTRY.
      # Do that request here so freshly published versions are cached in
      # INSTALL_REGISTRY immediately. npm pack downloads just the tarball (no
      # dep resolution), which is enough to trigger the upstream fetch.
      - script: |
          set -e
          primeDir=$(mktemp -d)
          cp $(buildDirectory)/.npmrc "$primeDir/.npmrc"
          cd "$primeDir"
          for file in $(publishedPackageDirectory)/*.tgz; do
            name=$(tar -xzOf "$file" package/package.json | jq -r .name)
            version=$(tar -xzOf "$file" package/package.json | jq -r .version)
            echo "Priming INSTALL_REGISTRY cache: $name@$version"
            npm pack --registry=$(INSTALL_REGISTRY) "$name@$version" > /dev/null
          done
        displayName: "Prime INSTALL_REGISTRY cache from upstream"
