# On-demand regeneration of package-level README.AUTOGEN.md companion
# files. This is the Azure DevOps half of the docs-autogen pipeline.
#
# Why this lives in Azure DevOps (not GitHub Actions):
#   Authoring the documentation bodies calls Azure OpenAI, which now
#   requires secretless Workload Identity Federation. GitHub federated
#   credentials are being deprecated and stored secrets / PATs are not
#   permitted, so the Azure-authenticated work must run here, where the
#   'MSOCTO-ADO-Service-Connection' WIF service connection provides a
#   secret-free Azure login (same pattern as azure-smoke-tests.yml).
#
# Why it still produces a GitHub PR:
#   This pipeline only *pushes a branch* back to GitHub, using the GitHub
#   App connection that already backs `checkout` (persisted credentials,
#   no stored PAT). Opening / updating the pull request is done by the
#   companion GitHub Actions workflow .github/workflows/docs-generate.yml,
#   which triggers on the pushed branch and uses the native, ephemeral
#   GITHUB_TOKEN. Each platform writes only with its own managed
#   identity; no cross-system secret is stored anywhere.
#
# Flow:
#   1. WIF login + getKeys -> ts/config.local.yaml (Azure OpenAI creds).
#   2. docs-autogen regenerates README.AUTOGEN.md for changed packages.
#      First run on a fresh watermark = full sweep (the CLI's cold-start
#      behaviour on the default branch); later runs diff against the
#      docs-bot/last-run tag.
#   3. prettier-format the generated files.
#   4. If anything changed: commit only README.AUTOGEN.md onto the stable
#      branch 'automated/docs-readmes' and force-push it. The companion
#      GitHub Action then opens or updates the single PR.
#   5. Advance / seed the docs-bot/last-run watermark tag.
#
# Prerequisites:
#   * GitHub service connection (the Azure Pipelines GitHub App) with
#     'Read and write access to code', so the persisted-credential push
#     to 'automated/docs-readmes' and the watermark tag push succeed. A
#     read-only connection will 403 on push.
#   * Azure Resource Manager service connection (Workload Identity
#     Federation) - 'MSOCTO-ADO-Service-Connection'. Its backing service
#     principal needs 'Key Vault Secrets User' on 'build-pipeline-kv'
#     (RBAC-authorized vault) and 'Cognitive Services OpenAI User' on the
#     Azure OpenAI resource(s). Authorize the pipeline to use it on first
#     run.
#   * Pipeline variable REGISTRY - internal npm Azure Artifacts feed used
#     by include-prepare-repo.yml to restore dependencies.

# Manual / on-demand only - mirrors the old workflow_dispatch trigger.
trigger: none
pr: none

parameters:
  - name: dryRun
    displayName: "Dry run - analyse + render only, no push / PR"
    type: boolean
    default: false
  - name: packages
    displayName: "Comma-separated package names (overrides change detection)"
    type: string
    default: " "
  - name: since
    displayName: "Override the watermark - git ref to diff against"
    type: string
    default: " "
  - name: llm
    displayName: "Author documentation bodies via Azure OpenAI"
    type: boolean
    default: true
  - name: maxPackages
    displayName: "Per-run package cap"
    type: string
    default: "100"

variables:
  - name: buildDirectory
    value: $(Build.SourcesDirectory)/ts
  - name: nodeVersion
    value: "22"
  - name: docsBranch
    value: automated/docs-readmes

jobs:
  - job: regenerate
    displayName: Regenerate README.AUTOGEN.md
    timeoutInMinutes: 90
    pool:
      vmImage: ubuntu-latest
    steps:
      # Checkout + internal npm registry auth + Node + pnpm install.
      # persistCredentials keeps the GitHub App connection token in git
      # config so the branch + tag pushes below can write back to GitHub
      # without any stored PAT.
      - template: include-prepare-repo.yml
        parameters:
          buildDirectory: $(buildDirectory)
          nodeVersion: $(nodeVersion)
          registry: $(REGISTRY)
          persistCredentials: true

      # docs-autogen diffs against the docs-bot/last-run tag and needs
      # full history + tags; the prepare-repo checkout may be shallow and
      # skips tags. Fetch them explicitly through the persisted creds.
      - script: |
          git fetch origin --tags --force --prune
          git fetch origin --unshallow || true
        displayName: Fetch full history + tags
        workingDirectory: $(buildDirectory)

      # The CLI's smart-default selection keys off HEAD being the default
      # branch; ADO checks out a detached HEAD, so re-point a local `main`
      # at the checked-out commit. With no watermark this yields the
      # first-run full sweep; with a watermark present it diffs from it.
      - script: |
          git checkout -B main
        displayName: "Set local branch to main (for change detection)"
        workingDirectory: $(buildDirectory)

      - script: |
          pnpm --filter '@typeagent/docs-autogen...' build
        displayName: Build docs-autogen tool
        workingDirectory: $(buildDirectory)

      # Single WIF login: publish AZURE_CLIENT_ID / AZURE_TENANT_ID /
      # AZURE_FEDERATED_TOKEN_FILE for @azure/identity's
      # WorkloadIdentityCredential, and pull Azure OpenAI creds into
      # ts/config.local.yaml while az is signed in. Same mechanism as
      # azure-smoke-tests.yml.
      - task: AzureCLI@2
        displayName: Azure login + Get Keys (WIF)
        inputs:
          azureSubscription: "MSOCTO-ADO-Service-Connection"
          scriptType: pscore
          scriptLocation: inlineScript
          addSpnToEnvironment: true
          workingDirectory: $(buildDirectory)
          inlineScript: |
            $tokenFile = Join-Path "$(Agent.TempDirectory)" "wif-federated-token.txt"
            Set-Content -Path $tokenFile -Value "$env:idToken" -NoNewline
            Write-Host "##vso[task.setvariable variable=AZURE_CLIENT_ID]$env:servicePrincipalId"
            Write-Host "##vso[task.setvariable variable=AZURE_TENANT_ID]$env:tenantId"
            Write-Host "##vso[task.setvariable variable=AZURE_FEDERATED_TOKEN_FILE]$tokenFile"
            node tools/scripts/getKeys.mjs --vault build-pipeline-kv --commit

      # Build argv from the parameters via env vars - never expand the
      # free-form parameters straight into the script body. Validate them
      # with strict allowlists first.
      - pwsh: |
          $ErrorActionPreference = 'Stop'
          $packages = "$env:INPUT_PACKAGES".Trim()
          $since = "$env:INPUT_SINCE".Trim()
          $maxPackages = "$env:INPUT_MAXPACKAGES".Trim()
          if ($packages -and $packages -notmatch '^[A-Za-z0-9@/_.,\s-]+$') {
            Write-Error "Invalid characters in 'packages'."; exit 1
          }
          if ($since -and $since -notmatch '^[A-Za-z0-9._/-]+$') {
            Write-Error "Invalid characters in 'since'."; exit 1
          }
          if ($maxPackages -notmatch '^[0-9]+$') {
            Write-Error "'maxPackages' must be a positive integer."; exit 1
          }
          $cliArgs = @('--render')
          if ($env:INPUT_DRYRUN -eq 'True') { $cliArgs += '--dry-run' } else { $cliArgs += '--write' }
          foreach ($pkg in ($packages -split ',')) {
            $p = $pkg.Trim(); if ($p) { $cliArgs += @('--package', $p) }
          }
          if ($since) { $cliArgs += @('--since', $since) }
          if ($env:INPUT_LLM -eq 'True') { $cliArgs += '--llm' }
          $cliArgs += @('--max-packages', $maxPackages)
          Write-Host "docs-autogen $($cliArgs -join ' ')"
          node tools/docsAutogen/bin/docs-autogen.cjs @cliArgs
        displayName: Regenerate README.AUTOGEN.md
        workingDirectory: $(buildDirectory)
        env:
          DEBUG: "docs-autogen:*"
          INPUT_DRYRUN: ${{ parameters.dryRun }}
          INPUT_PACKAGES: ${{ parameters.packages }}
          INPUT_SINCE: ${{ parameters.since }}
          INPUT_LLM: ${{ parameters.llm }}
          INPUT_MAXPACKAGES: ${{ parameters.maxPackages }}

      # Re-format with the workspace prettier so the resulting PR passes
      # the repo's `prettier --check` gate. Skipped on dry runs.
      - script: |
          npx prettier --write 'packages/**/README.AUTOGEN.md'
        displayName: Format generated docs
        condition: and(succeeded(), ne('${{ parameters.dryRun }}', 'True'))
        workingDirectory: $(buildDirectory)

      # Commit + force-push the stable docs branch (only when something
      # changed). README.md is never touched by the generator. The
      # companion GitHub Action opens / updates the single PR.
      - script: |
          set -e
          if git diff --quiet --exit-code -- 'packages/**/README.AUTOGEN.md'; then
            echo "No README.AUTOGEN.md changes after regeneration."
            exit 0
          fi
          git config user.name "typeagent-docs-bot"
          git config user.email "typeagent-docs-bot@users.noreply.github.com"
          git checkout -B "$(docsBranch)"
          git add 'packages/**/README.AUTOGEN.md'
          git commit -m "docs: regenerate package README.AUTOGEN.md files ($(date +%Y-%m-%d))

          Automated by the azure-docs-generate pipeline.

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin --force "HEAD:refs/heads/$(docsBranch)"
        displayName: Commit + push docs branch
        condition: and(succeeded(), ne('${{ parameters.dryRun }}', 'True'))
        workingDirectory: $(buildDirectory)

      # Advance / seed the watermark to the commit this run was based on
      # so the next run diffs only source changed since here. Safe to
      # advance on no-change runs too - only `src` and `package.json` are
      # watched inputs, so neither the tag nor a later merge of the docs
      # PR retriggers regeneration.
      - script: |
          set -e
          git tag -f docs-bot/last-run "$(Build.SourceVersion)"
          git push origin --force "refs/tags/docs-bot/last-run:refs/tags/docs-bot/last-run"
        displayName: Advance docs watermark
        condition: and(succeeded(), ne('${{ parameters.dryRun }}', 'True'))
        workingDirectory: $(buildDirectory)

      # Remove provisioned secrets even if a prior step failed.
      - script: |
          node -e "try{require('fs').unlinkSync('./config.local.yaml');}catch(e){}"
          node -e "try{require('fs').unlinkSync('./.env');}catch(e){}"
        displayName: Clean up Keys
        condition: always()
        workingDirectory: $(buildDirectory)
