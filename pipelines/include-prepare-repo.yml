parameters:
  - name: buildDirectory
    type: string
  - name: nodeVersion
    type: string
  - name: registry
    type: string
  # Set false to skip pnpm-store caching. Useful for manual/scheduled pipelines
  # where the Windows post-job cache save can exceed its timeout and fail the job.
  - name: enableCache
    type: boolean
    default: true
  # Persist the source service connection's credentials in git config so
  # later steps can `git push` back to the origin (e.g. a bot branch /
  # tag). Default false to preserve existing read-only checkouts.
  - name: persistCredentials
    type: boolean
    default: false

steps:
  - checkout: self
    displayName: "Checkout TypeAgent Repository"
    path: typeagent
    persistCredentials: ${{ parameters.persistCredentials }}

  - bash: |
      echo "registry=${{ parameters.registry }}" > .npmrc
      cat .npmrc
    displayName: Set npm registry
    workingDirectory: ${{ parameters.buildDirectory }}

  - task: npmAuthenticate@0
    displayName: Authenticate to npm registry
    inputs:
      workingFile: ${{ parameters.buildDirectory }}/.npmrc

  - task: UseNode@1
    displayName: Setup Node.js v${{ parameters.nodeVersion }}
    inputs:
      version: ${{ parameters.nodeVersion }}
      checkLatest: true

  - template: include-install-pnpm.yml
    parameters:
      buildDirectory: ${{ parameters.buildDirectory }}
      enableCache: ${{ parameters.enableCache }}

  - script: |
      pnpm install --frozen-lockfile --strict-peer-dependencies
    displayName: "Install dependencies"
    workingDirectory: ${{ parameters.buildDirectory }}
    env:
      # CI agents may not have outbound access to storage.googleapis.com.
      # We don't need bundled browser binaries for package/deploy pipelines.
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
