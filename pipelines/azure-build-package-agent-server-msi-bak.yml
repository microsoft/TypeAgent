trigger: none
pr: none

pool:
  vmImage: 'windows-latest'

variables:
  - group: 'TypeAgent-Build'

jobs:
  - job: TestMSISigning
    displayName: 'Test MSI Signing (Certificate Fetch → Password Fetch → signtool Sign)'
    steps:
      - checkout: self
        fetchDepth: 1

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'
        displayName: 'Use Node 22'

      - task: AzureCLI@2
        displayName: 'Test: Pull certificate, get password, sign test file'
        inputs:
          azureSubscription: 'TypeAgent-Build'
          scriptType: 'ps'
          scriptLocation: 'inlineScript'
          inlineScript: |
            Write-Host "======================================"
            Write-Host "TEST: MSI Signing Pipeline"
            Write-Host "======================================"
            Write-Host ""
            
            # Working directory for scripts
            $scriptsDir = "$(Build.SourcesDirectory)\TypeAgent\ts\tools\scripts"
            
            # Step 1: Pull certificate from Key Vault
            Write-Host "📥 [1/4] Pulling TypeAgent dev certificate from Key Vault..."
            try {
                node "$scriptsDir\getCert.mjs" pull
                Write-Host "✅ Certificate retrieved"
            } catch {
                Write-Host "❌ Failed to pull certificate: $_"
                exit 1
            }
            Write-Host ""
            
            # Step 2: Get password
            Write-Host "🔐 [2/4] Fetching password via getCert.mjs get-password..."
            try {
                $tmpFile = node "$scriptsDir\getCert.mjs" get-password 2>&1 | Select-Object -Last 1
                if (-not (Test-Path $tmpFile)) {
                    Write-Host "❌ Password temp file not found: $tmpFile"
                    exit 1
                }
                $password = Get-Content $tmpFile
                Remove-Item $tmpFile -Force
                Write-Host "✅ Password retrieved (${$password.Length} bytes)"
                Write-Host "   Preview: $($password.Substring(0, 10))..."
            } catch {
                Write-Host "❌ Failed to get password: $_"
                exit 1
            }
            Write-Host ""
            
            # Step 3: Create a test file to sign (dummy text file)
            Write-Host "📄 [3/4] Creating test file to sign..."
            $testFile = "$(Agent.TempDirectory)\test-msi-signing.txt"
            @"
            This is a test file for signing validation.
            Created at: $(Get-Date -Format 'o')
            For: TypeAgent MSI Signing Pipeline Test
            "@  | Out-File -FilePath $testFile -Encoding UTF8 -NoNewline
            Write-Host "   Created: $testFile"
            Write-Host ""
            
            # Step 4: Sign with signtool
            Write-Host "✍️  [4/4] Signing test file with signtool..."
            $pfxPath = [System.IO.Path]::Combine($env:USERPROFILE, ".typeagent", "TypeAgent-Development-Certificate.pfx")
            $signtoolPath = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"
            
            if (-not (Test-Path $pfxPath)) {
                Write-Host "❌ PFX file not found: $pfxPath"
                exit 1
            }
            if (-not (Test-Path $signtoolPath)) {
                Write-Host "❌ signtool.exe not found: $signtoolPath"
                exit 1
            }
            
            Write-Host "   Using: $signtoolPath"
            Write-Host "   PFX: $pfxPath"
            Write-Host "   File: $testFile"
            Write-Host ""
            
            # Run signtool (direct invocation, no shell)
            Write-Host "   Running: signtool sign /fd SHA256 /f `"$pfxPath`" /p <PASSWORD> /t http://timestamp.digicert.com `"$testFile`""
            & $signtoolPath sign /fd SHA256 /a /f "$pfxPath" /p "$password" /t http://timestamp.digicert.com "$testFile"
            
            if ($LASTEXITCODE -eq 0) {
                Write-Host "✅ Signing succeeded (exit code: $LASTEXITCODE)"
            } else {
                Write-Host "❌ Signing failed (exit code: $LASTEXITCODE)"
                exit $LASTEXITCODE
            }
            Write-Host ""
            
            # Step 5: Verify signature
            Write-Host "🔍 [5/5] Verifying signature..."
            & $signtoolPath verify /pa "$testFile"
            if ($LASTEXITCODE -eq 0) {
                Write-Host "✅ Signature verified"
            } else {
                Write-Host "⚠️  Signature verification failed (exit code: $LASTEXITCODE)"
            }
            Write-Host ""
            
            Write-Host "======================================"
            Write-Host "TEST COMPLETE"
            Write-Host "======================================"
