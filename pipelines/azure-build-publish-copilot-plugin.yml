# Builds the TypeAgent Copilot CLI plugin and publishes its runtime artifacts
# as `typeagent-copilot-plugin` to the `typeagent` feed.
#
# The plugin is pure JavaScript (esbuild-bundled, no native deps), so a single
# platform-neutral package is published — no per-RID matrix required.
#
# The MSI build downloads this package alongside agent-server.<rid> to bundle
# the end-to-end Copilot CLI integration into a single installer.
#
# Manual / scheduled, not per-PR.

trigger:
  branches:
    include:
      - main


pr:
  branches:
    exclude:
      - "*"

variables:
  - name: buildDirectory
    value: $(Build.SourcesDirectory)/ts
  - name: nodeVersion
    value: 22
  - name: packageVersion
    value: 0.0.1-$(Build.BuildId)
  - name: adoOrgUrl
    value: https://dev.azure.com/msctoproj
  - name: adoProject
    value: AI_Systems
  - name: adoFeed
    value: typeagent
  - name: stagingDir
    value: $(Build.ArtifactStagingDirectory)/copilot-plugin

jobs:
  - job: build_publish_copilot_plugin
    displayName: Build & publish typeagent-copilot-plugin
    pool:
      vmImage: ubuntu-latest

    steps:
      - template: include-prepare-repo.yml
        parameters:
          buildDirectory: $(buildDirectory)
          nodeVersion: $(nodeVersion)
          registry: $(INSTALL_REGISTRY)
          enableCache: false

      - template: include-update-package-version.yml
        parameters:
          buildDirectory: $(buildDirectory)
          prerelease: ci.$(Build.BuildId)

      # Build the plugin and its workspace dependencies (tsc + esbuild bundle).
      # fluid-build resolves the workspace dependency graph automatically.
      - script: |
          pnpm run build copilot-plugin
        displayName: Build copilot-plugin (+ deps)
        workingDirectory: $(buildDirectory)

      # Stage only the runtime artifact — dist/ bundles + config files.
      # node_modules is NOT included: the esbuild bundles are self-contained.
      - bash: |
          set -euo pipefail
          PLUGIN_SRC="$(buildDirectory)/packages/copilot-plugin"
          STAGE="$(stagingDir)"
          mkdir -p "$STAGE"

          cp -r "$PLUGIN_SRC/dist"       "$STAGE/dist"
          cp    "$PLUGIN_SRC/hooks.json" "$STAGE/hooks.json"
          cp    "$PLUGIN_SRC/.mcp.json"  "$STAGE/.mcp.json"
          cp    "$PLUGIN_SRC/plugin.json" "$STAGE/plugin.json"

          # agents/ and skills/ are markdown/config only
          cp -r "$PLUGIN_SRC/agents"     "$STAGE/agents"
          cp -r "$PLUGIN_SRC/skills"     "$STAGE/skills"

          echo "Staged plugin artifact:"
          find "$STAGE" -type f | sort
        displayName: Stage plugin artifact (dist + config files)
        workingDirectory: $(buildDirectory)

      # Publish to the typeagent Universal feed.
      - bash: |
          set -euo pipefail
          az extension add --name azure-devops --only-show-errors || true
          echo "Publishing typeagent-copilot-plugin v$(packageVersion)"
          az artifacts universal publish \
            --organization "$(adoOrgUrl)" --project "$(adoProject)" --scope project \
            --feed "$(adoFeed)" \
            --name "typeagent-copilot-plugin" \
            --version "$(packageVersion)" \
            --path "$(stagingDir)" \
            --description "TypeAgent Copilot CLI plugin (hooks, MCP server, agents)"
        displayName: Publish typeagent-copilot-plugin
        workingDirectory: $(buildDirectory)
        env:
          AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)

      # Also publish the staged artifact to the pipeline for inspection/debugging.
      - publish: $(stagingDir)
        displayName: Upload plugin artifact
        artifact: copilot-plugin
