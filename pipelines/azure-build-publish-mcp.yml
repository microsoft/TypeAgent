# Builds the TypeAgent MCP server as a single-file executable per platform and
# publishes it as `typeagent-mcp.<rid>` Universal packages to the `typeagent`
# feed, so the plugin marketplace entry can launch it on demand via an
# allowlisted artifact-exec launcher that resolves a binary inside the
# downloaded artifact (per platform).
#
# RID naming follows the .NET-style convention (win-x64, osx-x64, linux-x64 —
# NOT Node's win32/darwin) expected by the launcher's `--rid auto` resolution.
# Manual / scheduled, not per-PR.

trigger:
  branches:
    include:
      - main

pr:
  branches:
    exclude:
      - "*"

variables:
  - name: buildDirectory
    value: $(Build.SourcesDirectory)/ts
  - name: nodeVersion
    value: 22
  - name: packageVersion
    value: 0.0.1-$(Build.BuildId)
  - name: adoOrgUrl
    value: https://dev.azure.com/msctoproj
  - name: adoProject
    value: AI_Systems
  - name: adoFeed
    value: typeagent
  - name: stagingDir
    value: $(Build.ArtifactStagingDirectory)

jobs:
  - job: build_publish_mcp
    displayName: Build & publish typeagent-mcp exe
    strategy:
      matrix:
        win_x64:
          image: windows-latest
          rid: win-x64
        osx_x64:
          image: macos-latest
          rid: osx-x64
        linux_x64:
          image: ubuntu-latest
          rid: linux-x64
        # arm64 RIDs (win-arm64 / osx-arm64 / linux-arm64) need self-hosted or
        # cross-arch agents; hosted images above are x64. Add when available.
    pool:
      vmImage: $(image)
    steps:
      - template: include-prepare-repo.yml
        parameters:
          buildDirectory: $(buildDirectory)
          nodeVersion: $(nodeVersion)
          registry: $(REGISTRY)
          # Manual/scheduled; skip store caching (the Windows post-job cache save
          # can exceed its timeout and fail the job after a successful publish).
          enableCache: false

      # Build the plugin AND its workspace dependencies. `pnpm --filter <pkg> run
      # build` would build only the plugin, leaving @typeagent/agent-sdk /
      # agent-server-client / dispatcher-types unbuilt (TS2307). `pnpm run build
      # <regexp>` routes through fluid-build, which builds the matched package and
      # its dependencies in topological order.
      - script: |
          pnpm run build copilot-plugin
        displayName: Build copilot-plugin (+ deps)
        workingDirectory: $(buildDirectory)

      # Compile the MCP server into a single-file executable (Node SEA) for this
      # platform. Produces packages/copilot-plugin/dist-exe/typeagent-mcp[.exe].
      - script: |
          pnpm --filter @typeagent/copilot-plugin run build:exe
        displayName: Build typeagent-mcp exe ($(rid))
        workingDirectory: $(buildDirectory)

      # Stage just the executable for publishing.
      - bash: |
          set -euo pipefail
          mkdir -p "$(stagingDir)/typeagent-mcp"
          src="$(buildDirectory)/packages/copilot-plugin/dist-exe"
          if [ -f "$src/typeagent-mcp.exe" ]; then
            cp "$src/typeagent-mcp.exe" "$(stagingDir)/typeagent-mcp/"
          else
            cp "$src/typeagent-mcp" "$(stagingDir)/typeagent-mcp/"
          fi
          ls -la "$(stagingDir)/typeagent-mcp"
        displayName: Stage executable
        workingDirectory: $(buildDirectory)

      # TODO: code-sign the executable here (Windows: Trusted Signing/ESRP;
      # macOS: codesign + notarize) before publishing for external distribution.

      - bash: |
          set -euo pipefail
          az extension add --name azure-devops --only-show-errors || true
          echo "Publishing typeagent-mcp.$(rid) v$(packageVersion)"
          az artifacts universal publish \
            --organization "$(adoOrgUrl)" --project "$(adoProject)" --scope project \
            --feed "$(adoFeed)" \
            --name "typeagent-mcp.$(rid)" --version "$(packageVersion)" \
            --path "$(stagingDir)/typeagent-mcp" \
            --description "TypeAgent MCP server (single-file) for $(rid)"
        displayName: Publish typeagent-mcp.$(rid)
        workingDirectory: $(buildDirectory)
        env:
          AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
