trigger: none
pr: none

pool:
  vmImage: 'windows-latest'

jobs:
  - job: TestMSISigning
    displayName: 'Test MSI Signing (Certificate Fetch -> Password Fetch -> signtool Sign)'
    steps:
      - checkout: self
        fetchDepth: 1

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'
        displayName: 'Use Node 22'

      - task: Cache@2
        displayName: 'Cache pnpm modules'
        inputs:
          key: 'pnpm | "$(Agent.OS)" | ts/pnpm-lock.yaml'
          path: '$(Build.SourcesDirectory)/ts/node_modules'
          cacheHitVar: CACHE_RESTORED

      - script: npm install -g pnpm
        displayName: 'Install pnpm'
        condition: ne(variables.CACHE_RESTORED, 'true')

      - script: pnpm install --frozen-lockfile
        displayName: 'Install dependencies'
        workingDirectory: '$(Build.SourcesDirectory)/ts'
        condition: ne(variables.CACHE_RESTORED, 'true')

      - task: AzureCLI@2
        displayName: 'Test: Pull certificate, get password, sign test file'
        inputs:
          azureSubscription: $(azureSubscription)
          scriptType: 'ps'
          scriptLocation: 'inlineScript'
          inlineScript: |
            Write-Host "======================================"
            Write-Host "TEST: MSI Signing Pipeline"
            Write-Host "======================================"
            Write-Host ""

            $scriptsDir = "$(Build.SourcesDirectory)\ts\tools\scripts"
            Write-Host "Scripts directory: $scriptsDir"
            Write-Host ""

            Write-Host "[1/4] Pulling TypeAgent dev certificate from Key Vault..."
            node "$scriptsDir\getCert.mjs" pull
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Failed to pull certificate"
              exit $LASTEXITCODE
            }
            Write-Host "Certificate retrieved"
            Write-Host ""

            Write-Host "[2/4] Fetching password via getCert.mjs get-password..."
            $tmpFile = node "$scriptsDir\getCert.mjs" get-password 2>&1 | Select-Object -Last 1
            if (-not (Test-Path $tmpFile)) {
              Write-Host "Password temp file not found: $tmpFile"
              exit 1
            }
            $password = Get-Content $tmpFile
            Remove-Item $tmpFile -Force
            Write-Host "Password retrieved ($($password.Length) bytes)"
            Write-Host "Preview: $($password.Substring(0, 10))..."
            Write-Host ""

            Write-Host "[3/4] Creating signable test executable..."
            $testSrc = "$(Agent.TempDirectory)\test-msi-signing.cs"
            $testFile = "$(Agent.TempDirectory)\test-msi-signing.exe"
            @"
            using System;

            internal static class Program
            {
                private static void Main()
                {
                    Console.WriteLine("TypeAgent signing test");
                }
            }
            "@ | Out-File -FilePath $testSrc -Encoding ascii -NoNewline

            $cscCandidates = @(
              "$env:WINDIR\Microsoft.NET\Framework64\v4.0.30319\csc.exe",
              "$env:WINDIR\Microsoft.NET\Framework\v4.0.30319\csc.exe"
            )
            $cscPath = $cscCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if (-not $cscPath) {
              Write-Host "C# compiler not found on agent"
              exit 1
            }

            & $cscPath /nologo /target:exe /out:"$testFile" "$testSrc"
            if ($LASTEXITCODE -ne 0 -or -not (Test-Path $testFile)) {
              Write-Host "Failed to create test executable"
              exit 1
            }

            Write-Host "Created: $testFile"
            Write-Host ""

            Write-Host "[4/4] Signing test file with signtool..."
            $pfxPath = [System.IO.Path]::Combine($env:USERPROFILE, ".typeagent", "TypeAgent-Development-Certificate.pfx")
            $signtoolPath = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"

            if (-not (Test-Path $pfxPath)) {
              Write-Host "PFX file not found: $pfxPath"
              exit 1
            }
            if (-not (Test-Path $signtoolPath)) {
              Write-Host "signtool.exe not found: $signtoolPath"
              exit 1
            }

            Write-Host "Using: $signtoolPath"
            Write-Host "PFX: $pfxPath"
            Write-Host "File: $testFile"
            Write-Host ""

            Write-Host "Running: signtool sign /fd SHA256 /f `"$pfxPath`" /p <PASSWORD> /t http://timestamp.digicert.com `"$testFile`""
            & $signtoolPath sign /fd SHA256 /a /f "$pfxPath" /p "$password" /t http://timestamp.digicert.com "$testFile"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Signing failed (exit code: $LASTEXITCODE)"
              exit $LASTEXITCODE
            }
            Write-Host "Signing succeeded"
            Write-Host ""

            Write-Host "[5/5] Verifying signature..."
            $verifyOutput = & $signtoolPath verify /pa "$testFile" 2>&1
            $verifyExit = $LASTEXITCODE
            $verifyText = ($verifyOutput | Out-String)
            Write-Host $verifyText

            if ($verifyExit -eq 0) {
              Write-Host "Signature verified"
            } elseif ($verifyText -match "not trusted by the trust provider") {
              Write-Host "Warning: Signature is valid but cert chain is not trusted on this hosted agent."
              Write-Host "Continuing because this pipeline is validating signing/password flow, not trust store provisioning."
              $global:LASTEXITCODE = 0
            } else {
              Write-Host "Signature verification failed (exit code: $verifyExit)"
              exit $verifyExit
            }
            Write-Host ""

            Write-Host "======================================"
            Write-Host "TEST COMPLETE"
            Write-Host "======================================"
