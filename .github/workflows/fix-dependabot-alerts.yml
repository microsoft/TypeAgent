# Automatically remediate Dependabot security alerts by running the
# fix-dependabot-alerts script, verifying the build for each fix,
# and opening a pull request with the passing changes.
#
# Uses a GitHub App (via actions/create-github-app-token) to authenticate
# with the Dependabot alerts REST API, since GITHUB_TOKEN does not have
# access to this endpoint. Requires DEPENDABOT_APP_ID (variable) and
# DEPENDABOT_APP_PRIVATE_KEY (secret).

name: fix-dependabot-alerts

on:
  schedule:
    # Run daily at 9:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run — analyse only, don't apply fixes"
        type: boolean
        default: false
      auto-fix-args:
        description: "Extra flags for the script (e.g. --apply-overrides=pkg1,pkg2)"
        type: string
        default: "--auto-fix"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  fix-alerts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          package_json_file: ts/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: ts/pnpm-lock.yaml

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DEPENDABOT_APP_ID }}
          private-key: ${{ secrets.DEPENDABOT_APP_PRIVATE_KEY }}

      - name: Verify gh authentication
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh auth status
          echo "---"
          gh api repos/${{ github.repository }}/dependabot/alerts?per_page=1 --jq 'length' || echo "API call failed with exit $?"

      # ── Analyse and fix alerts across workspaces ──────────────────────
      #
      # Auto-discovers which workspaces have open alerts by querying the
      # Dependabot API, then for each workspace:
      # 1. Installs dependencies (if not already installed)
      # 2. Dry-run to discover fixable packages
      # 3. Applies each package's fix individually
      # 4. Build-checks after each; rolls back failures
      # 5. Only passing fixes survive into the PR
      - name: Analyse and fix alerts
        id: fix
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SCRIPT="$GITHUB_WORKSPACE/ts/tools/scripts/fix-dependabot-alerts.mjs"
          FLAGS="${{ inputs.auto-fix-args || '--auto-fix' }}"
          ALL_APPLIED=""
          ALL_ROLLED_BACK=""
          ALL_BLOCKED_PACKAGES=""
          ALL_NO_PATCH_PACKAGES=""
          TOTAL_RESOLVED=0
          TOTAL_BLOCKED=0
          TOTAL_FAILED=0

          # Discover workspaces with open npm alerts from the Dependabot API
          WORKSPACES=$(gh api "repos/${{ github.repository }}/dependabot/alerts?state=open&per_page=100" \
            --paginate \
            --jq '[.[] | select(.dependency.package.ecosystem == "npm") | .dependency.manifest_path | split("/")[0]] | unique | .[]')

          if [ -z "$WORKSPACES" ]; then
            echo "No open npm Dependabot alerts found 🎉"
            echo "resolved=0" >> "$GITHUB_OUTPUT"
            echo "blocked=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Workspaces with alerts: $WORKSPACES"

          for WS_DIR in $WORKSPACES; do
            echo "=========================================="
            echo "Processing workspace: $WS_DIR"
            echo "=========================================="
            cd "$GITHUB_WORKSPACE/$WS_DIR"

            # Install dependencies for this workspace
            echo "::group::Installing $WS_DIR dependencies"
            corepack enable
            if ! pnpm install --frozen-lockfile 2>&1; then
              echo "::warning::Dependency install failed for $WS_DIR — skipping (analysis would be unreliable)"
              echo "::endgroup::"
              continue
            fi
            echo "::endgroup::"

            # ── Step 1: Discover fixable packages ───────────────────
            echo "::group::Analysing $WS_DIR alerts"
            node "$SCRIPT" --dry-run --json --skip-install > /tmp/dep-analysis.json 2>/tmp/dep-analysis.log || true

            if ! jq -e '.summary' /tmp/dep-analysis.json > /dev/null 2>&1; then
              echo "No valid analysis for $WS_DIR — skipping"
              cat /tmp/dep-analysis.log || true
              echo "::endgroup::"
              continue
            fi

            WS_BLOCKED=$(jq '.summary.blocked' /tmp/dep-analysis.json)
            WS_NO_PATCH=$(jq '.summary.noPatch' /tmp/dep-analysis.json)
            BLOCKED_PKGS=$(jq -r '[.blocked[].package] | unique | join(", ")' /tmp/dep-analysis.json)
            NO_PATCH_PKGS=$(jq -r '[.noPatch[].package] | unique | join(", ")' /tmp/dep-analysis.json)

            FIXABLE=$(jq -r '.resolved[].package' /tmp/dep-analysis.json | sort -u)
            FIXABLE_COUNT=$(echo "$FIXABLE" | grep -c . || true)
            echo "Fixable $WS_DIR packages ($FIXABLE_COUNT): $FIXABLE"
            echo "::endgroup::"

            # Accumulate blocked/no-patch
            TOTAL_BLOCKED=$((TOTAL_BLOCKED + WS_BLOCKED))
            [ -n "$BLOCKED_PKGS" ] && ALL_BLOCKED_PACKAGES="${ALL_BLOCKED_PACKAGES:+$ALL_BLOCKED_PACKAGES, }$BLOCKED_PKGS"
            [ -n "$NO_PATCH_PKGS" ] && ALL_NO_PATCH_PACKAGES="${ALL_NO_PATCH_PACKAGES:+$ALL_NO_PATCH_PACKAGES, }$NO_PATCH_PKGS"

            if [ "$FIXABLE_COUNT" -eq 0 ]; then
              echo "No fixable alerts in $WS_DIR"
              continue
            fi

            if [ "${{ inputs.dry-run }}" == "true" ]; then
              TOTAL_RESOLVED=$((TOTAL_RESOLVED + FIXABLE_COUNT))
              continue
            fi

            # ── Step 2: Apply fixes one package at a time ───────────
            for PKG in $FIXABLE; do
              echo "::group::Fixing $WS_DIR/$PKG"

              # Save a rollback point
              cp package.json /tmp/pkg-backup.json
              cp pnpm-lock.yaml /tmp/lock-backup.yaml 2>/dev/null || true

              # Build targeted args
              read -r -a extra_args <<< "$FLAGS"
              filtered_args=()
              for arg in "${extra_args[@]}"; do
                case "$arg" in
                  --auto-fix|--auto-fix=*)
                    ;;
                  *)
                    filtered_args+=("$arg")
                    ;;
                esac
              done
              filtered_args+=("--auto-fix=$PKG")
              filtered_args+=("--skip-install")
              echo "Running: fix-dependabot-alerts.mjs ${filtered_args[*]}"
              set +e
              node "$SCRIPT" "${filtered_args[@]}" 2>&1
              fix_exit=$?
              set -e

              if [ "$fix_exit" -ne 0 ] && git diff --quiet; then
                echo "::warning::Script failed for $PKG in $WS_DIR (exit $fix_exit) with no file changes"
                TOTAL_FAILED=$((TOTAL_FAILED + 1))
                echo "::endgroup::"
                continue
              fi

              if ! git diff --quiet; then
                echo "Changes detected, reinstalling and verifying build..."
                set +e
                if [ "$WS_DIR" = "ts" ]; then
                  pnpm install --frozen-lockfile --strict-peer-dependencies 2>&1
                else
                  pnpm install --frozen-lockfile 2>&1
                fi
                install_exit=$?
                set -e

                if [ "$install_exit" -ne 0 ]; then
                  echo "::warning::pnpm install failed after fixing $PKG in $WS_DIR — rolling back"
                  cp /tmp/pkg-backup.json package.json
                  cp /tmp/lock-backup.yaml pnpm-lock.yaml 2>/dev/null || true
                  pnpm install 2>&1 || true
                  git checkout -- . 2>/dev/null || true
                  ALL_ROLLED_BACK="$ALL_ROLLED_BACK $PKG"
                  TOTAL_FAILED=$((TOTAL_FAILED + 1))
                  echo "::endgroup::"
                  continue
                fi

                if [ "$WS_DIR" = "ts" ]; then
                  node tools/scripts/repo-policy-check.mjs --fix 2>/dev/null || true
                fi

                set +e
                pnpm run build 2>&1
                build_exit=$?
                set -e

                if [ "$build_exit" -ne 0 ]; then
                  echo "::warning::Build failed after fixing $PKG in $WS_DIR — rolling back"
                  cp /tmp/pkg-backup.json package.json
                  cp /tmp/lock-backup.yaml pnpm-lock.yaml 2>/dev/null || true
                  pnpm install 2>&1 || true
                  git checkout -- . 2>/dev/null || true
                  ALL_ROLLED_BACK="$ALL_ROLLED_BACK $PKG"
                  TOTAL_FAILED=$((TOTAL_FAILED + 1))
                else
                  echo "✅ $PKG fixed and build passed"
                  ALL_APPLIED="$ALL_APPLIED $PKG"
                  TOTAL_RESOLVED=$((TOTAL_RESOLVED + 1))
                fi
              else
                echo "No changes for $PKG (may already be fixed)"
              fi

              echo "::endgroup::"
            done
          done

          # ── Step 3: Report results ──────────────────────────────────
          echo "resolved=$TOTAL_RESOLVED" >> "$GITHUB_OUTPUT"
          echo "blocked=$TOTAL_BLOCKED" >> "$GITHUB_OUTPUT"
          echo "failed=$TOTAL_FAILED" >> "$GITHUB_OUTPUT"
          echo "applied_packages=$ALL_APPLIED" >> "$GITHUB_OUTPUT"
          echo "rolled_back_packages=$ALL_ROLLED_BACK" >> "$GITHUB_OUTPUT"
          echo "blocked_packages=$ALL_BLOCKED_PACKAGES" >> "$GITHUB_OUTPUT"
          echo "no_patch_packages=$ALL_NO_PATCH_PACKAGES" >> "$GITHUB_OUTPUT"

          cd "$GITHUB_WORKSPACE"
          if git diff --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Files changed:"
            git diff --stat
          fi

      # ── Final build + shell packaging verification ──────────────────
      - name: Final build verification
        if: ${{ steps.fix.outputs.changes == 'true' }}
        id: build
        working-directory: ts
        run: |
          node tools/scripts/repo-policy-check.mjs --fix || true
          pnpm run build
          echo "build_ok=true" >> "$GITHUB_OUTPUT"
        env:
          DEBUG_DEMB: true

      - name: Package - shell
        if: ${{ steps.build.outputs.build_ok == 'true' }}
        id: shell
        working-directory: ts
        run: |
          pnpm run shell:package
          echo "shell_ok=true" >> "$GITHUB_OUTPUT"

      # ── Create PR ───────────────────────────────────────────────────
      - name: Create pull request
        if: ${{ steps.fix.outputs.changes == 'true' && steps.build.outputs.build_ok == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="automated/fix-dependabot-alerts-$(date +%Y%m%d)-${{ github.run_number }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix: remediate Dependabot security alerts

          Automated by fix-dependabot-alerts workflow.

          Applied:${{ steps.fix.outputs.applied_packages }}
          Rolled back:${{ steps.fix.outputs.rolled_back_packages || ' (none)' }}
          Blocked: ${{ steps.fix.outputs.blocked }} package(s)
          Shell packaging: ${{ steps.shell.outputs.shell_ok == 'true' && 'passed' || 'skipped' }}

          Co-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

          git push origin "$BRANCH"

          # Build PR body from step outputs
          APPLIED="${{ steps.fix.outputs.applied_packages }}"
          ROLLED="${{ steps.fix.outputs.rolled_back_packages }}"
          RESOLVED="${{ steps.fix.outputs.resolved }}"
          BLOCKED="${{ steps.fix.outputs.blocked }}"
          FAILED="${{ steps.fix.outputs.failed }}"
          BLOCKED_PKGS="${{ steps.fix.outputs.blocked_packages }}"
          NO_PATCH_PKGS="${{ steps.fix.outputs.no_patch_packages }}"

          BODY=$(cat <<'PREOF'
          ## Automated Dependabot Alert Remediation

          This PR was automatically generated by the `fix-dependabot-alerts` workflow.
          Each fix was applied individually and build-verified before inclusion.

          ### Summary
          PREOF
          )

          BODY="$BODY
          - **Applied ($RESOLVED):**$APPLIED
          - **Blocked ($BLOCKED):**${BLOCKED_PKGS:- (none)}
          - **No patch available:**${NO_PATCH_PKGS:- (none)}
          - **Rolled back ($FAILED):**${ROLLED:- (none)}
          - **Build:** ✅ Passed
          - **Shell packaging:** ${{ steps.shell.outputs.shell_ok == 'true' && '✅ Passed' || '⚠️ Skipped' }}

          ### How this works
          1. Analyses all open Dependabot alerts
          2. Applies each fix **individually** with build verification
          3. Rolls back any fix that breaks the build
          4. Only passing fixes are included in this PR

          ### Review checklist
          - [ ] Check that no breaking changes were introduced
          - [ ] Verify rolled-back packages are investigated separately
          - [ ] Run tests locally if concerned about specific packages"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "fix: remediate Dependabot security alerts ($(date +%Y-%m-%d))" \
            --body "$BODY" \
            --label "dependencies,security"

      # ── Summary ─────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          echo "## Dependabot Alert Remediation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Applied | ${{ steps.fix.outputs.resolved || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Blocked | ${{ steps.fix.outputs.blocked || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rolled back | ${{ steps.fix.outputs.failed || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.fix.outputs.applied_packages }}" ]; then
            echo "**Applied:**${{ steps.fix.outputs.applied_packages }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${{ steps.fix.outputs.rolled_back_packages }}" ]; then
            echo "**Rolled back:**${{ steps.fix.outputs.rolled_back_packages }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.fix.outputs.changes }}" == "true" ]; then
            echo "✅ Changes applied and PR created" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ inputs.dry-run }}" == "true" ]; then
            echo "ℹ️ Dry run — no changes applied" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ No fixable alerts found" >> "$GITHUB_STEP_SUMMARY"
          fi
