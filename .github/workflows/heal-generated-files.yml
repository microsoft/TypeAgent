# Auto-heal generated-file conflicts on open pull requests.  When main moves,
# open PRs can start conflicting on generated files - the pnpm lockfile and the
# autogenerated README.AUTOGEN.md companions - and get ejected from the merge
# queue.  This job merges main into each affected same-repo PR branch and
# resolves those files so no one has to do it by hand.  The logic lives in
# ts/tools/scripts/heal-generated-files.mjs.
#
# Triggers: the push-to-main scan reconciles every affected PR when main moves;
# pull_request events heal a single PR the moment it needs it (opened behind
# main, or an author push that reconflicts the lockfile).  No self-commit guard
# is needed - the healing push re-triggers this workflow, but the re-run trial-
# merges main, finds nothing left to resolve, and exits without pushing, so the
# cycle terminates by idempotency (same reasoning as docs-pr-amend.yml).

name: Heal Generated Files

on:
  # main moving is what pushes open PRs into conflict, so this scan stays the
  # primary trigger - one run reconciles every affected branch at once.
  push:
    branches: ["main"]
  # Also heal a single PR the moment it needs it, without waiting for the next
  # push to main: opened/reopened already behind main, or an author push that
  # reintroduces a lockfile conflict.  No `paths` filter - the conflict comes
  # from merging main, not from what the PR itself changed, so the trial merge
  # is the real gate and exits fast when there is nothing to resolve.
  #
  # `synchronize` fires a run on every push to every same-repo PR.  That is
  # deliberate: the lockfile currently churns often, so PRs reconflict on it
  # frequently and healing right on the author's push is what spares them the
  # manual resolve.  Each run is cheap (checkout + trial-merge, exits fast when
  # clean).  If that churn settles and the run volume stops being worth it, drop
  # to [opened, reopened] and let the push-to-main scan catch author-push
  # reconflicts on the next merge.
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr:
        description: "Single PR number to heal (default: scan all open PRs)"
        type: string

concurrency:
  # One shared lane for every trigger (push scan, PR events, manual dispatch)
  # so two runs never push to the same branch at once, and never cancel a run
  # mid-push.
  group: heal-generated-files
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  heal:
    # Fork PRs are skipped: their pull_request runs get a read-only token and no
    # app secret, so the healing commit could not be pushed back anyway.  push
    # and workflow_dispatch carry no pull_request payload, so they always run.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      # `vars`/`secrets` cannot be used directly in step `if` conditions, so
      # expose whether the app credentials are configured as a string.  The App
      # id is a repo variable (as in docs-pr-amend.yml / fix-dependabot-alerts).
      HAS_APP_CREDS: ${{ vars.DEPENDABOT_APP_ID != '' }}
    steps:
      - name: Setup Git LF
        run: git config --global core.autocrlf false

      # Push to PR branches with the typeagent-bot app token (not the default
      # GITHUB_TOKEN), so the healing commit re-triggers the PR's normal checks.
      - name: Generate app token
        id: app-token
        if: env.HAS_APP_CREDS == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DEPENDABOT_APP_ID }}
          private-key: ${{ secrets.DEPENDABOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          package_json_file: ts/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: ts/pnpm-lock.yaml

      - name: Heal conflicted generated files
        if: env.HAS_APP_CREDS == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Empty on the push scan (heal every open PR); one number on a
          # pull_request event or manual dispatch (heal just that PR).
          INPUT_PR: ${{ github.event.inputs.pr || github.event.pull_request.number }}
        run: node ts/tools/scripts/heal-generated-files.mjs
