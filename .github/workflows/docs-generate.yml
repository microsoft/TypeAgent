# Opens (or updates) the pull request for automated README.AUTOGEN.md
# regeneration. This is the GitHub half of the docs-autogen pipeline.
#
# The Azure-authenticated regeneration runs in Azure DevOps
# (pipelines/azure-docs-generate.yml): authoring the docs calls Azure
# OpenAI via secretless Workload Identity Federation, which GitHub
# Actions can no longer do (GitHub federated credentials are being
# deprecated and stored secrets / PATs are not permitted). That pipeline
# force-pushes the regenerated files to the stable `automated/docs-readmes`
# branch using its GitHub App connection.
#
# This workflow reacts to that push and opens the PR using the native,
# ephemeral GITHUB_TOKEN - no stored secret. If a PR for the branch is
# already open, the force-push has already updated it and there is
# nothing to do. Because the branch is stable and force-pushed each run,
# there is only ever one docs PR, which updates in place.
#
# Note: the upstream push is performed by the Azure Pipelines GitHub App
# (not GITHUB_TOKEN), so it does trigger this `push` workflow. The PR is
# created with GITHUB_TOKEN, which deliberately does not trigger further
# workflow runs - acceptable here, there is nothing downstream to run.

name: docs-generate

on:
  push:
    branches:
      - automated/docs-readmes

# Only ever one docs PR in flight; serialize concurrent pushes.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  open-or-update-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Open or update the docs PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: automated/docs-readmes
          BASE_BRANCH: main
        run: |
          set -euo pipefail

          # If an open PR already exists for this branch, the force-push
          # that triggered this run has already updated it - nothing to do.
          EXISTING=$(gh pr list \
            --head "$HEAD_BRANCH" \
            --base "$BASE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for $HEAD_BRANCH; it updates automatically."
            exit 0
          fi

          BODY=$(cat <<'PREOF'
          ## Automated package README.AUTOGEN.md regeneration

          Generated by the `azure-docs-generate` Azure DevOps pipeline
          (Azure OpenAI authoring via Workload Identity Federation) and
          pushed to `automated/docs-readmes`. This PR is opened / kept
          up to date by the `docs-generate` GitHub Actions workflow using
          the native `GITHUB_TOKEN` - no stored secret on either side.

          - `README.md` is never modified - only the parallel
            `README.AUTOGEN.md` companion files.
          - The pipeline advances the `docs-bot/last-run` watermark, so
            each run only regenerates packages whose source changed since
            the previous run.

          See [`ts/docs/architecture/doc-autogen.md`](../blob/main/ts/docs/architecture/doc-autogen.md)
          for design details.
          PREOF
          )

          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$HEAD_BRANCH" \
            --title "docs: regenerate package README.AUTOGEN.md files" \
            --body "$BODY" \
            --label "documentation"
